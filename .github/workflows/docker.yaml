name: Create Docker Image
on:
    release:
        types:
            - published
    workflow_dispatch:

env:
    DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/pgmanager
    DOCKER_SOURCE: github.com/${{ github.repository }}

jobs:
    build:
        name: Build
        strategy:
            matrix:
                arch: [amd64, arm64]
        runs-on:
            ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || matrix.arch == 'arm64'
            && 'ubuntu-24.04-arm' }}
        env:
            OS: linux
            ARCH: ${{ matrix.arch }}
        outputs:
            tag: ${{ steps.build.outputs.tag }}
        permissions:
            contents: read
            packages: write
        steps:
            - name: Install build tools
              run: |
                  sudo apt -y update
                  sudo apt -y install build-essential git
                  git config --global advice.detachedHead false
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  submodules: recursive
            - name: Login
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and Push
              id: build
              run: |
                  make docker && make docker-push && make docker-version >> "$GITHUB_OUTPUT"
    manifest:
        name: Manifest
        needs: build
        strategy:
            matrix:
                tag:
                    - ${{ needs.build.outputs.tag }}
                    - "latest"
        runs-on: ubuntu-latest
        permissions:
            packages: write
        steps:
            - name: Login
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Create
              run: |
                  docker manifest create ${DOCKER_REPO}:${{ matrix.tag }} \
                                        --amend ${DOCKER_REPO}:${{ needs.build.outputs.tag }}-linux-amd64 \
                                        --amend ${DOCKER_REPO}:${{ needs.build.outputs.tag }}-linux-arm64
            - name: Annotate
              run: |
                  docker manifest annotate --arch amd64 --os linux \
                    ${DOCKER_REPO}:${{ matrix.tag }} \
                                        ${DOCKER_REPO}:${{ needs.build.outputs.tag }}-linux-amd64
                  docker manifest annotate --arch arm64 --os linux \
                    ${DOCKER_REPO}:${{ matrix.tag }} \
                                        ${DOCKER_REPO}:${{ needs.build.outputs.tag }}-linux-arm64
            - name: Push
              run: |
                  docker manifest push ${DOCKER_REPO}:${{ matrix.tag }}
